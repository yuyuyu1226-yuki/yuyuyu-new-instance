<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英検 演習問題</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .quiz {
            margin-bottom: 20px;
        }
        .result {
            font-weight: bold;
        }
        #next-button, #retry-button, #finish-button {
            display: none;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/js-sha256@0.9.0/build/sha256.min.js"></script>
</head>
<body>
    <h1>英検 演習問題</h1>
    <div id="quiz-container"></div>
    <button id="next-button" onclick="loadNextQuestion()">次の問題へ</button>
    <button id="retry-button" onclick="retryIncorrectQuestions()">間違えた問題を解き直す</button>
    <button id="finish-button" onclick="finishQuiz()">解き直す</button>

    <script>
        // 30問の問題文と正解のハッシュ値をペアで定義
        const questions = [
            { question: '犬を英語で何と言いますか？', answer: '06d80eb0c50b49a509b49f2424e8c805' }, // dog
            { question: '走るを英語で何と言いますか？', answer: 'd2ddea18f00665ce8623e36bd4e3c7c5' }, // run
            { question: '学校を英語で何と言いますか？', answer: 'bb1d043b9570606db7b93b2f7b4c19a0' }, // school
            { question: '家を英語で何と言いますか？', answer: '9b3c85ba225be9e46a2cc78b2707d970' }, // house
            { question: '猫を英語で何と言いますか？', answer: 'c4e5d219c87b3b1e97b91d4d2ecb5779' }, // cat
            { question: '食べるを英語で何と言いますか？', answer: '08d7db9da5cfed51682a2f55b0306a5d' }, // eat
            { question: '見るを英語で何と言いますか？', answer: '5f39ec43c10a9db90a4e31e81eac8b50' }, // see
            { question: '読むを英語で何と言いますか？', answer: 'd7a399d3a4231539b1f927e4aaf97e93' }, // read
            { question: '書くを英語で何と言いますか？', answer: '9d92da76ba8f0f3873e7ca2e58d0c62a' }, // write
            { question: '歩くを英語で何と言いますか？', answer: '5d8bbf80ec25a55fd2e220b5e0c4e417' }, // walk
            { question: '泳ぐを英語で何と言いますか？', answer: '933f16015815c65cc8975b4a93cc5667' }, // swim
            { question: '開けるを英語で何と言いますか？', answer: 'f72bfa5f9ef1f4b46579b7f8cfca54c0' }, // open
            { question: '閉めるを英語で何と言いますか？', answer: 'b1ff94b6c3d0197f9a898f8cf51a94ea' }, // close
            { question: '乗るを英語で何と言いますか？', answer: 'de7170e2a320f951648b79b97f81f938' }, // ride
            { question: '降りるを英語で何と言いますか？', answer: 'd57b33a5671c31cf3477c1214f40db85' }, // get off
            { question: '食事をするを英語で何と言いますか？', answer: '0b9a0a5c3d04ff87557327ed4311b542' }, // have a meal
            { question: '聞くを英語で何と言いますか？', answer: '97e9d90e1e771f2a3a22610b1f2c120d' }, // ask
            { question: '買うを英語で何と言いますか？', answer: 'f79f264a4975eae7b303edb6f179fc5e' }, // buy
            { question: '借りるを英語で何と言いますか？', answer: '6e12c17f1c1c39d9679a57b32c4a29ff' }, // borrow
            { question: '返すを英語で何と言いますか？', answer: 'c57a18ac1a0278032831053c4d6f5e9e' }, // return
        ];

        let currentQuestionIndex = 0;
        let answers = [];
        let isSkip = false;

        function loadNextQuestion() {
            if (currentQuestionIndex < questions.length) {
                let question = questions[currentQuestionIndex];
                document.getElementById('quiz-container').innerHTML = `
                    <div class="quiz">
                        <p>${question.question}</p>
                        <input type="text" id="answer-input" placeholder="答えを入力">
                        <button onclick="checkAnswer()">回答</button>
                    </div>
                `;
            } else {
                endQuiz();
            }
        }

        function checkAnswer() {
            let userAnswer = document.getElementById('answer-input').value.trim();
            if (isSkip) {
                answers.push(true);
                currentQuestionIndex = questions.length;
                loadNextQuestion();
                return;
            }

            let correctAnswerHash = questions[currentQuestionIndex].answer;
            let userAnswerHash = sha256(userAnswer);

            if (userAnswerHash === correctAnswerHash) {
                answers.push(true);
            } else {
                answers.push(false);
            }

            currentQuestionIndex++;
            loadNextQuestion();
        }

        function skipAllQuestions() {
            isSkip = true;
            loadNextQuestion();
        }

        function endQuiz() {
            document.getElementById('quiz-container').innerHTML = `<p>終了！</p>`;
            document.getElementById('next-button').style.display = 'none';
        }

        // 最初の質問を読み込む
        loadNextQuestion();

        // キーワード「skip」で全問スキップ
        document.addEventListener('input', (event) => {
            if (event.target.value.toLowerCase() === 'skip') {
                skipAllQuestions();
            }
        });
    </script>
</body>
</html>
