<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズチャレンジ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px 0;
        }
        #remaining-count {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
        #quiz-container {
            margin: 20px auto;
            width: 90%;
            max-width: 600px;
        }
        .quiz {
            margin: 20px 0;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: calc(100% - 22px);
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
    <script src="/js/utils/utils.js"></script>
</head>
<body>
    <header>
        <h1>クイズチャレンジ</h1>
    </header>
    <div id="remaining-count">残り 30 問</div>
    <div id="quiz-container"></div>
    <script>
        let currentQuestionIndex = 0;
        let correctAnswersCount = 0;

         const questions = [
            // 国語（竹取物語）
            { question: '「竹取物語」の冒頭、竹取の翁の職業は何？', answer: '83218ac34c1834c26781fe4bde918ee4' }, // [竹取]
            { question: '「竹取物語」に登場するかぐや姫が昇天する理由は？', answer: '18d8040dc6f0b06899eeb3dc8b90668d' }, // [月に帰る使命のため]
            { question: '「竹取物語」に登場するかぐや姫を迎えに来た使者の正体は？', answer: '2e65f2f2fc99c417d9a07930c3a5fdfa' }, // [月の人]
            { question: '「竹取物語」で翁が見つけた光る竹から出てきたものは？', answer: 'cc2f21ccf58a79eb2ef47e37691b8e6a' }, // [かぐや姫]
            { question: 'かぐや姫を迎えに来た日は何日？', answer: 'd9d4f495e875a2e075a1a4a6e1b9770f' }, // [十五夜]
            { question: 'かぐや姫の正体は？', answer: 'd8a1dd06c1f2dbb9cb176e1606e6f8d2' }, // [月の住人]

            // 数学（正の数・負の数）
            { question: '5 + (-3) の答えは？', answer: '99914b932bd37a50b983c5e7c90ae93b' }, // [2]
            { question: '-7 + 4 の答えは？', answer: '18f0e6fb1b56bfedbc1aa1ac529e5dc2' }, // [-3]
            { question: '(-5) × 2 の答えは？', answer: 'd5c3f95b372de43b10a8b4cce785d56b' }, // [-10]
            { question: '3 × (-4) の答えは？', answer: '6a39629f5ae55a8b5b209acda048e8e9' }, // [-12]
            { question: '(-2) ÷ (-1) の答えは？', answer: 'c0cb5f0fcf239ab3d9c1fcd31fff1efc' }, // [2]
            { question: '-4 ÷ 2 の答えは？', answer: 'e223baff21da0e09b4af82cba804a277' }, // [-2]

            // 理科（光の色）
            { question: 'プリズムを通して分解される光の7色のうち、波長が最も短い色は？', answer: '4b43b0aee35624cd95b910189b3dc231' }, // [紫]
            { question: '虹の7色の一番外側に見える色は？', answer: '4c2a6c07aa06afbcf29d012cbc07a573' }, // [赤]
            { question: '太陽光をプリズムに通すと光は何色に分かれる？', answer: 'dd7515c930c97f3a9cc4b3d594b3844f' }, // [7色]
            { question: '赤い光と青い光では、どちらが波長が長い？', answer: '714dbaf46a179c8db593442be8b5b01e' }, // [赤]
            { question: '白い光は何色の光が合わさってできる？', answer: '9146df0bd9efb0f2951c2181e97b8d6e' }, // [7色]
            { question: '光の3原色は何？', answer: 'd041dab926bf34d4199f09822d3dcf32' }, // [赤・緑・青]

            // 社会（日本の都道府県）
            { question: '日本の首都はどこ？', answer: '3c59dc048e8850243be8079a5c74d079' }, // [東京]
            { question: '北海道の県庁所在地はどこ？', answer: 'cfcd208495d565ef66e7dff9f98764da' }, // [札幌]
            { question: '日本で最も人口が多い都道府県はどこ？', answer: '3c59dc048e8850243be8079a5c74d079' }, // [東京]
            { question: '日本で最も面積が広い都道府県はどこ？', answer: '08fefee001f5f00f75aa742ee93c2e63' }, // [北海道]
            { question: '沖縄県の県庁所在地はどこ？', answer: '03c7c0ace395d80182db07ae2c30f034' }, // [那覇]
            { question: '四国にある都道府県はいくつ？', answer: '6a9bfc93e24d1db879e99315c8a9cd83' }, // [4]

            // 英語（英検5級過去問）
            { question: 'This is a (___). 答えは何を表す？\n1. dog 2. cat 3. bird 4. fish', answer: '06d80eb0c50b49a509b49f2424e8c805' }, // [dog]
            { question: 'What time is it? 7時の場合、正しい答えはどれ？\n1. It is seven o’clock. 2. It is six o’clock.', answer: 'f899139df5e1059396431415e770c6dd' }, // [It is seven o'clock.]
            { question: 'How are you? に対する答えとして適切なものは？\n1. I’m fine, thank you. 2. Yes, I am.', answer: 'c1d9f50f86825a1a2302ec2449c17196' }, // [I'm fine, thank you.]
            { question: 'What is your name? に対する答えとして適切なものは？\n1. I’m John. 2. Yes, it is.', answer: '35f4a8d465e6e1edc05f3d8ab658c551' }, // [I'm John.]
            { question: 'Where is the book? の意味は？\n1. 本はどこですか？ 2. あなたの名前は何ですか？', answer: '8fa14cdd754f91cc6554c9e71929cce7' }, // [本はどこですか？]
            { question: 'apple の意味は？\n1. りんご 2. みかん', answer: '1c383cd30b7c298ab50293adfecb7b18' }, // [りんご]
        ];

        function loadNextQuestion() {
            if (currentQuestionIndex < questions.length) {
                const question = questions[currentQuestionIndex];
                document.getElementById('quiz-container').innerHTML = `
                    <div class="quiz">
                        <p>${question.question}</p>
                        <input type="text" id="answer-input" placeholder="答えを入力">
                        <button onclick="checkAnswer()">回答</button>
                    </div>
                `;
                updateRemainingCount();
            } else {
                evaluateResults();
            }
        }

        function updateRemainingCount() {
            const remaining = questions.length - currentQuestionIndex;
            document.getElementById('remaining-count').textContent = `残り ${remaining} 問`;
        }

        function checkAnswer() {
    const answer = document.getElementById('answer-input').value.trim();
    
    // Skip 機能
    if (answer.toLowerCase() === 'skip') {
        correctAnswersCount = questions.length; // 全問正解として扱う
        currentQuestionIndex = questions.length; // 全問スキップ
        evaluateResults();
        return;
    }

    // 正解判定
    const question = questions[currentQuestionIndex];
    sha256(answer).then((hash) => {
        if (hash === question.answer) {
            correctAnswersCount++;
        }
        currentQuestionIndex++;
        loadNextQuestion();
    });
}



        function evaluateResults() {
            const passPercentage = 60; // 合格ライン（60%）
            const totalQuestions = questions.length;
            const passCount = Math.ceil((passPercentage / 100) * totalQuestions);

            if (correctAnswersCount >= passCount) {
                // 転移先URL作成
                const currentUrl = window.location.href;
                const newUrl = currentUrl.replace(/\/genesis$/, '');
                
                if (currentUrl !== newUrl) {
                    window.location.href = newUrl;
                } else {
                    alert('転移先が見つかりません。');
                }
            } else {
                document.getElementById('quiz-container').innerHTML = `
                    <p>残念！正解数が ${passPercentage}% に達しませんでした。</p>
                    <button onclick="retryQuiz()">間違えた問題を解き直す</button>
                `;
                document.getElementById('remaining-count').textContent = '結果';
            }
        }

        function retryQuiz() {
            currentQuestionIndex = 0;
            correctAnswersCount = 0;
            loadNextQuestion();
        }

        loadNextQuestion();
    </script>
</body>
</html>
