<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>英検</title>
        <style>
            body {
                margin: 0 auto;
            }
            
            nav {
                width: 100%;
                height: 70px;
                background-color: dimgray;
                padding-top: 5px;
                box-sizing: border-box;
            }
            
            nav ul {
                display: flex;
            }
            
            nav li {
                list-style: none;
            }
            
            a {
                display: block;
                text-decoration: none;
                color: white;
                margin-right: 35px;
            }
            
            main {
                background-color: #fefefe;
            }
            
        </style>
        <script src="/js/utils/utils.js"></script>
        <script>
            function checkAnswer(){
                sha256(document.getElementById('user_answer').value).then((hash) => {
                    if(hash === 'c13193a0fd67c8c4bbd740bafe1edd132114d45e24d6091edd0d494fce7b6cdf') {
                        document.getElementById('result').textContent = '正解';
                        document.cookie = 'yuki=True; path=/';
                        location.replace('/')
                    } else {
                        document.getElementById('result').textContent = '不正解'
                    }
                });
            }
        </script>
    </head>
    <body>
            
        <header>
            <nav>
                <ul>
                    <li>英検 各級の目安</li>
                </ul>
            </nav>
        </header>
            
        <main>
    <table border="1">
        <thead>
            <tr>
                <th>級</th>
                <th>目安</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>5級</td>
                <td>中学初級程度</td>
            </tr>
            <tr>
                <td>4級</td>
                <td>中学中級程度</td>
            </tr>
            <tr>
                <td>3級</td>
                <td>中学卒業程度</td>
            </tr>
            <tr>
                <td>準2級</td>
                <td>高校中級程度</td>
            </tr>
            <tr>
                <td>2級</td>
                <td>高校卒業程度</td>
            </tr>
            <tr>
                <td>準1級</td>
                <td>大学中級程度</td>
            </tr>
            <tr>
                <td>1級</td>
                <td>大学上級程度</td>
            </tr>
        </tbody>
    </table>
</main>

</table>

        </main>

        <footer>
            <input id="user_answer" type="text" placeholder="英検3級の目安は？">
            <button onclick="checkAnswer()">確かめる</button>
            <p id="result"></p>
        </footer>
    </body>
</html>
