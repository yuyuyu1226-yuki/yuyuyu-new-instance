<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>中学1年クイズ</title>
    <script>
        function checkAnswers() {
            // 正解をプレーンテキストで定義
            const correctAnswers = [
                "みぞう",          // Q1 未曾有の読み方
                "どちらも大差がない", // Q2 五十歩百歩の意味
                "形容詞",         // Q3 「美しい」の品詞
                "かぐや姫",        // Q4 竹取物語の主人公
                "松尾芭蕉"         // Q5 俳句「古池や」の作者
            ];

            // ユーザーの入力値を取得
            const userAnswers = Array.from(document.querySelectorAll(".user-answer")).map(input => input.value.trim());
            let correctCount = 0;

            // 答えを比較
            for (let i = 0; i < correctAnswers.length; i++) {
                if (userAnswers[i] === correctAnswers[i]) {
                    correctCount++;
                }
            }

            // 正解率を計算
            const score = (correctCount / correctAnswers.length) * 100;

            // 合否判定とCookieの設定
            if (score >= 60) {
                document.cookie = "yuki=True; path=/";
                document.getElementById("result").textContent = `合格！スコア: ${score}%`;
            } else {
                document.getElementById("result").textContent = `不合格。スコア: ${score}%`;
            }
        }
    </script>
</head>
<body>
    <form id="quiz-form">
        <ol>
            <li>未曾有の読み方: <input class="user-answer" type="text"></li>
            <li>五十歩百歩の意味(どちらも大差がない): <input class="user-answer" type="text"></li>
            <li>「美しい」の品詞: <input class="user-answer" type="text"></li>
            <li>竹取物語の主人公: <input class="user-answer" type="text"></li>
            <li>俳句「古池や」の作者: <input class="user-answer" type="text"></li>
        </ol>
        <button type="button" onclick="checkAnswers()">採点する</button>
    </form>
    <p id="result"></p>
</body>
</html>
