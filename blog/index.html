<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>英検</title>
        <style>
            body {
                margin: 0 auto;
            }
            
            nav {
                width: 100%;
                height: 70px;
                background-color: dimgray;
                padding-top: 5px;
                box-sizing: border-box;
            }
            
            nav ul {
                display: flex;
            }
            
            nav li {
                list-style: none;
            }
            
            a {
                display: block;
                text-decoration: none;
                color: white;
                margin-right: 35px;
            }
            
            main {
                background-color: #fefefe;
            }
            
        </style>
        <script src="/js/utils/utils.js"></script>
        <script>
            function checkAnswer(){
                sha256(document.getElementById('user_answer').value).then((hash) => {
                    if(hash === 'b4003030a618a54e83c92ac29756ea2ff0cedb7b06c0cdd5433e9eb0688194a9') {
                        document.getElementById('result').textContent = '正解';
                        document.cookie = 'yuki=True; path=/';
                        location.replace('/')
                    } else {
                        document.getElementById('result').textContent = '不正解'
                    }
                });
            }
        </script>
    </head>
    <body>
            
        <header>
            <nav>
                <ul>
                    <li>英検 各級の目安</li>
                </ul>
            </nav>
        </header>
            
        <main>
          <table border="1">
    <thead>
        <tr>
            <th>5級</th>
            <th>4級</th>
            <th>3級</th>
            <th>準2級</th>
            <th>2級</th>
            <th>準1級</th>
            <th>1級</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>中学初級程度</td>
            <td>中学中級程度</td>
            <td>中学卒業程度</td>
            <td>高校中級程度</td>
            <td>高校卒業程度</td>
            <td>大学中級程度</td>
            <td>大学上級程度</td>
        </tr>
</tbody>
</table>

        </main>

        <footer>
            <input id="user_answer" type="text" placeholder="英検3級の目安は？">
            <button onclick="checkAnswer()">確かめる</button>
            <p id="result"></p>
        </footer>
    </body>
</html>
