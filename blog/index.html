<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>英検の級別目安と演習問題</title>
        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: #f9f9f9;
                color: #333;
                line-height: 1.6;
            }
            
            nav {
                width: 100%;
                height: 70px;
                background-color: dimgray;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 1.5em;
            }

            main {
                padding: 20px;
                max-width: 800px;
                margin: 0 auto;
                background-color: #fff;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
                border-radius: 10px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 20px;
            }

            table th, table td {
                border: 1px solid #ddd;
                padding: 10px;
                text-align: center;
            }

            table th {
                background-color: #f4f4f4;
            }

            footer {
                text-align: center;
                margin-top: 20px;
            }

            input[type="text"] {
                padding: 10px;
                width: 70%;
                margin-right: 10px;
                border: 1px solid #ddd;
                border-radius: 5px;
                font-size: 1em;
            }

            button {
                padding: 10px 20px;
                font-size: 1em;
                background-color: dimgray;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }

            button:hover {
                background-color: #555;
            }

            @media (max-width: 600px) {
                nav {
                    font-size: 1.2em;
                }

                input[type="text"] {
                    width: 60%;
                }
            }

            .quiz {
                margin-top: 30px;
            }

            .quiz p {
                margin-bottom: 10px;
            }

            .quiz .result {
                font-weight: bold;
                margin-top: 10px;
            }
        </style>
        <script src="/js/utils/utils.js"></script>
        <script>
            function checkAnswer(userAnswer, correctAnswer, resultId) {
                const input = document.getElementById(userAnswer).value.trim().toLowerCase();
                sha256(input).then((hash) => {
                    if (hash === correctAnswer) {
                        document.getElementById(resultId).textContent = '正解!';
                        document.getElementById(resultId).style.color = 'green';
                    } else {
                        document.getElementById(resultId).textContent = '不正解です。もう一度考えてみてください。';
                        document.getElementById(resultId).style.color = 'red';
                    }
                });
            }
        </script>
    </head>
    <body>
        <header>
            <nav>
                英検 各級の目安と演習問題
            </nav>
        </header>

        <main>
            <h2>英検 各級の目安</h2>
            <table>
                <thead>
                    <tr>
                        <th>級</th>
                        <th>目安</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>5級</td>
                        <td>中学初級程度</td>
                    </tr>
                    <tr>
                        <td>4級</td>
                        <td>中学中級程度</td>
                    </tr>
                    <tr>
                        <td>3級</td>
                        <td>中学卒業程度</td>
                    </tr>
                    <tr>
                        <td>準2級</td>
                        <td>高校中級程度</td>
                    </tr>
                    <tr>
                        <td>2級</td>
                        <td>高校卒業程度</td>
                    </tr>
                    <tr>
                        <td>準1級</td>
                        <td>大学中級程度</td>
                    </tr>
                    <tr>
                        <td>1級</td>
                        <td>大学上級程度</td>
                    </tr>
                </tbody>
            </table>

            <h2>英検 演習問題</h2>
            <div class="quiz">
                <p>問題1: 「犬」を英語で何と言いますか？</p>
                <input id="quiz1" type="text" placeholder="答えを入力">
                <button onclick="checkAnswer('quiz1', '4d186321c1a7f0f354b297e8914ab240', 'result1')">答え合わせ</button>
                <p id="result1" class="result"></p>
            </div>

            <div class="quiz">
                <p>問題2: 「走る」を英語で何と言いますか？</p>
                <input id="quiz2" type="text" placeholder="答えを入力">
                <button onclick="checkAnswer('quiz2', '5d41402abc4b2a76b9719d911017c592', 'result2')">答え合わせ</button>
                <p id="result2" class="result"></p>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 英検演習</p>
        </footer>
    </body>
</html>
